interface:
  display_name: "Repo Drift Auditor"
  short_description: "Audit docs, backlog, and workflow drift"
  default_prompt: "Use $ezop-repo-drift-auditor to audit whether this repo's docs, backlog, workflows, and implementation reality have drifted apart, then recommend whether $ezop-agent-ready-docs, $ezop-delivery-planner, $ezop-backlog-loop-orchestrator, or $ezop-slice-reviewer should handle the next step."
policy:
  allow_implicit_invocation: false
