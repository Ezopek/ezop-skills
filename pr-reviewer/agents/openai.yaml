interface:
  display_name: "PR Reviewer"
  short_description: "Review PRs for quality, security, and maintainability"
  default_prompt: "Use $pr-reviewer to review the current pull request for code quality, security, performance, test coverage, and maintainability. Report findings first, ordered by severity, and end with a clear approve/request-changes/blocked decision."
policy:
  allow_implicit_invocation: false
